<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical A Arca de Noé</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('arcadenoe.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
        }

        .container {
            position: absolute;
            top: 14%;
            right: 5%;
            width: 100%;
            max-width: 340px;
            padding: 10px;
        }

        .titulo-lista {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            font-size: 19px;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 65vh;
            overflow-y: auto;
        }

        li {
            text-align: center;
            padding: 14px;
            background: rgba(255,255,255,0.92);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-family: "Anton", sans-serif;
            color: #2F9D97;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

            li:hover {
                background: #E6C08A;
                color: white;
                transform: scale(1.02);
            }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 680px;
            max-height: 92vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
        }

        .modal-header {
            background: #2F9D97;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
        }

        .modal-body {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        audio {
            width: 100%;
            margin-bottom: 12px;
        }

        .tab-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

            .tab-btn.active {
                background: #2F9D97;
                color: white;
            }

        .lyrics {
            font-size: 16px;
            line-height: 1.7;
            text-align: center;
            white-space: pre-line;
        }

        .pdf-container {
            height: 65vh;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .erro {
            color: red;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="titulo-lista">Escolha uma Música</h2>
        <ul id="menu-musicas"></ul>
        <div id="erro-container"></div>
    </div>

    <!-- Modal (mantido igual) -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="close-btn" onclick="fecharModal()">×</button>
            </div>
            <div class="modal-body">
                <audio id="audio-player" controls preload="metadata"></audio>

                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="showTab(0)">Letra</button>
                    <button class="tab-btn" onclick="showTab(1)">Partitura (PDF)</button>
                </div>

                <div id="tab-letra">
                    <div class="loading" id="loading">Carregando letra...</div>
                    <div class="lyrics" id="modal-lyrics"></div>
                </div>

                <div id="tab-pdf" style="display:none;">
                    <div class="pdf-container">
                        <iframe id="pdf-iframe"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let musicas = [];

        async function carregarMusicas() {
            const erroContainer = document.getElementById('erro-container');
            erroContainer.innerHTML = '';

            try {
                const resp = await fetch('https://raw.githubusercontent.com/marceloarao/marcadenoe/main/musicas.json', { cache: 'no-store' });

                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const data = await resp.json();
                musicas = data.musicas || [];

                if (musicas.length === 0) throw new Error("Nenhuma música encontrada no JSON");

                criarMenu();
            } catch (e) {
                console.error(e);
                erroContainer.innerHTML = `<div class="erro">❌ Não foi possível carregar a lista de músicas.<br>Verifique se o arquivo musicas.json existe no GitHub.</div>`;
            }
        }

        function criarMenu() {
            const ul = document.getElementById('menu-musicas');
            ul.innerHTML = '';
            musicas.forEach(m => {
                const li = document.createElement('li');
                li.textContent = m.titulo;
                li.onclick = () => abrirModal(m);
                ul.appendChild(li);
            });
        }

        let currentMusic = null;

        async function abrirModal(musica) {
            currentMusic = musica;
            document.getElementById('modal-title').textContent = musica.titulo;
            document.getElementById('audio-player').src = musica.audioSrc;
            document.getElementById('modal').style.display = 'flex';
            showTab(0);

            const loading = document.getElementById('loading');
            const lyricsEl = document.getElementById('modal-lyrics');
            loading.style.display = 'block';
            lyricsEl.style.display = 'none';

            try {
                const resp = await fetch(musica.lyricsUrl);
                lyricsEl.textContent = (await resp.text()).trim();
            } catch (e) {
                lyricsEl.textContent = "Não foi possível carregar a letra.";
            } finally {
                loading.style.display = 'none';
                lyricsEl.style.display = 'block';
            }
        }

        function showTab(n) {
            document.getElementById('tab-letra').style.display = n === 0 ? 'block' : 'none';
            document.getElementById('tab-pdf').style.display = n === 1 ? 'block' : 'none';
            if (n === 1 && currentMusic) {
                document.getElementById('pdf-iframe').src = currentMusic.pdfUrl;
            }
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('audio-player').pause();
            document.getElementById('pdf-iframe').src = '';
        }

        window.onclick = e => { if (e.target.id === 'modal') fecharModal(); };

        window.onload = carregarMusicas;
    </script>
</body>
</html>
